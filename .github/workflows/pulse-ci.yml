name: Pulse Consumer CI

on:
  push:
    branches: [ consumer-v1 ]
  pull_request:
    branches: [ consumer-v1 ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x ./android/gradlew

    - name: Build Pulse Debug APK
      working-directory: ./android
      run: ./gradlew :app:assemblePulseDebug --stacktrace --parallel

    - name: Run Unit Tests (Pulse)
      working-directory: ./android
      run: ./gradlew :app:testPulseDebugUnitTest --stacktrace

    - name: Run Lint Check (Pulse)
      working-directory: ./android
      run: ./gradlew :app:lintPulseDebug --stacktrace

    - name: Upload Pulse Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: pulse-debug-apk
        path: android/app/build/outputs/apk/pulse/debug/app-pulse-debug.apk
        retention-days: 7

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          android/app/build/test-results/
          android/app/build/reports/
        retention-days: 7

    - name: Upload Lint Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-report
        path: android/app/build/reports/lint-results-pulseDebug.html
        retention-days: 7
