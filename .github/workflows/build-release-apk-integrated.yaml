name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false
        default: 'main'

permissions:
  contents: write

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run Unit Tests
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest --stacktrace --no-daemon

  compose-metrics:
    name: Compose Metrics Analysis
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run Compose metrics analysis
        working-directory: android
        run: |
          set -o pipefail
          mkdir -p compose-metrics-output
          
          # Run scripts and show output for debugging
          if [ -f "scripts/analyze-compose-metrics.sh" ]; then
            chmod +x scripts/analyze-compose-metrics.sh
            ./scripts/analyze-compose-metrics.sh
          else
            echo "⚠️ Warning: scripts/analyze-compose-metrics.sh not found, skipping"
          fi
          
          if [ -f "tools/metrics-analysis/analyze_metrics.py" ]; then
            python3 tools/metrics-analysis/analyze_metrics.py
          else
            echo "⚠️ Warning: tools/metrics-analysis/analyze_metrics.py not found, skipping"
          fi

      - name: Upload metrics report
        uses: actions/upload-artifact@v4
        if: always()  # Upload even if metrics fail
        with:
          name: compose-metrics-report
          path: android/compose-metrics-output/
          retention-days: 14

  build:
    name: Build Release APK
    needs: [test, compose-metrics]  # Wait for BOTH test and metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Get build timestamp
        id: ts
        run: echo "ts=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -x connectedDebugAndroidTest \
            -x connectedCheck \
            --stacktrace \
            --info

      - name: Find APK Path
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK at: $APK_PATH"

      - name: Upload release APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ steps.find_apk.outputs.apk_path }}
          tag_name: release-${{ github.run_number }}
          body: |
            # Release APK Build #${{ github.run_number }}

            **Build Date:** ${{ steps.ts.outputs.ts }}
            **Branch:** ${{ github.event.inputs.branch || 'main' }}
            **Commit:** ${{ github.sha }}
