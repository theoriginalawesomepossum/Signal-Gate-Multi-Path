name: Build Release APK

on:
  push:
    branches:
      - main
      - develop
      - feature/compose-metrics-analysis
  pull_request:
    branches:
      - main
      - develop
      - feature/compose-metrics-analysis

permissions:
  contents: write  # Required for creating releases and uploading assets

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}
          
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle
          
      - name: Run Unit Tests
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest --stacktrace --no-daemon

  build:
    name: Build Release APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}
          
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle
          
      - name: Get build timestamp
        id: ts
        run: echo "ts=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
        
      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease \
            -x connectedDebugAndroidTest \
            -x connectedCheck \
            --stacktrace \
            --info
            
      - name: Find APK Path
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Found APK at: $APK_PATH"
          
      - name: Upload release APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ steps.find_apk.outputs.apk_path }}
          tag_name: release-${{ github.run_number }}
          body: |
            # Release APK Build #${{ github.run_number }}
            
            **Build Date:** ${{ steps.ts.outputs.ts }}
            **Branch:** ${{ github.event.inputs.branch || github.ref_name }}
            **Commit:** ${{ github.sha }}
            
            ## Status
            - Unit tests passed
            - Android release build complete
            
      - name: Print APK location
        run: |
          echo "Release APK built successfully!"
          echo "Location: ${{ steps.find_apk.outputs.apk_path }}"
          echo "Size: $(du -h "${{ steps.find_apk.outputs.apk_path }}" | cut -f1)"
