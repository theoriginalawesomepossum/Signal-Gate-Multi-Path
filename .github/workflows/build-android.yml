name: Build React Native Android

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3  # Installs cmdline-tools, platform-tools, accepts licenses

    - name: Install Android SDK components  # Add build-tools, platforms as needed
      run: sdkmanager --install "build-tools;35.0.0" "platforms;android-35"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install  # Or npm ci

    - name: Build Android APK
      run: |
        cd android
        ./gradlew clean assembleDebug --no-daemon
        # Or ./gradlew bundleRelease for AAB (add signing secrets for release)

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
