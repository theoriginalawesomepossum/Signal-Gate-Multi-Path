name: Gemini Compose Metrics Review

on:
  workflow_run:
    workflows:
      - Compose Metrics CI
    types:
      - completed
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  review-metrics:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gemini-cli'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Compose metrics artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: compose-metrics
          path: compose-metrics-output

      - name: Run Gemini CLI review
        uses: google-github-actions/run-gemini-cli@v1
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Review the generated Compose compiler metrics in compose-metrics-output/.

            Summarize:
            1. Regressions compared to the previous baseline.
            2. Unstable or newly unstable composables.
            3. Likely causes of instability or recomposition growth.
            4. Files or patterns that likely need refactoring.
            5. A short prioritized list of recommended fixes.

            Also compare the metrics findings against the repository's existing Android/Compose architecture and point out mismatches, suspicious patterns, or opportunities to reduce recomposition.

            Keep the review concise, actionable, and specific to this repository.
