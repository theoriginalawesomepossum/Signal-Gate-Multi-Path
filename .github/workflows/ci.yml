name: Compose Metrics CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - feature/compose-metrics-analysis

jobs:
  compose-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make scripts executable
        run: |
          chmod +x scripts/analyze-compose-metrics.sh
          chmod +x tools/metrics-analysis/analyze_metrics.py

      - name: Run Compose metrics analysis
        run: |
          mkdir -p compose-metrics-output
          ./scripts/analyze-compose-metrics.sh > compose-metrics-output/script.log 2>&1 || true
          python3 tools/metrics-analysis/analyze_metrics.py > compose-metrics-output/analyze_metrics.txt 2>&1 || true

      - name: Upload Compose metrics artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compose-metrics
          path: compose-metrics-output/
          retention-days: 14
