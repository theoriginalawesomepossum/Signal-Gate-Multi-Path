name: Compose Metrics CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop
      - feature/compose-metrics-analysis

permissions:
  contents: read

jobs:
  compose-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make scripts executable
        run: |
          chmod +x scripts/analyze-compose-metrics.sh
          chmod +x tools/metrics-analysis/analyze_metrics.py
          chmod +x android/gradlew

      - name: Run Compose metrics analysis
        shell: bash
        run: |
          mkdir -p compose-metrics-output
          
          echo "Starting Compose metrics analysis script..."
          if ! ./scripts/analyze-compose-metrics.sh > compose-metrics-output/script.log 2>&1; then
            echo "❌ Build script failed. Printing logs:"
            cat compose-metrics-output/script.log
            exit 1
          fi
          
          echo "Finding report directory..."
          REPORT_DIR=$(ls -td compose_metrics/reports/metrics_* 2>/dev/null | head -n 1)
          
          if [ -n "$REPORT_DIR" ]; then
            echo "✅ Analyzing report in $REPORT_DIR"
            if ! python3 tools/metrics-analysis/analyze_metrics.py "$REPORT_DIR" --json compose-metrics-output/analysis.json > compose-metrics-output/analyze_metrics.txt 2>&1; then
              echo "❌ Python analysis failed. Printing logs:"
              cat compose-metrics-output/analyze_metrics.txt
              exit 1
            fi
            echo "✅ Analysis complete."
          else
            echo "❌ No report directory found. Printing build logs:"
            cat compose-metrics-output/script.log
            exit 1
          fi

      - name: Upload Compose metrics artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compose-metrics
          path: compose-metrics-output/
          retention-days: 14
