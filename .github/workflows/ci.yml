name: Android CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - develop
      - feature/compose-metrics-analysis
  push:
    branches:
      - main
      - develop
      - feature/compose-metrics-analysis

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Run Unit Tests
        run: cd android && ./gradlew clean testDebugUnitTest --stacktrace --no-daemon
