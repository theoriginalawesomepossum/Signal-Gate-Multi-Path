name: Gemini CLI Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  issues:
    types: [opened, reopened, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gemini:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gemini-cli')) ||
      (github.event_name == 'issues')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Gemini CLI
        uses: google-github-actions/run-gemini-cli@v1
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Review this repository change carefully.
            Check for:
            - syntax mistakes
            - mismatches with nearby files
            - deviations from the app's reference model
            - repetitive tasks requested by @gemini-cli
            - opportunities to simplify or comment out matching patterns
            Provide concise, actionable feedback.
