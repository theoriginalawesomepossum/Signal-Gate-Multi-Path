name: Android CI / Automated UI Verification

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  ui-verification:
    # macOS runners natively support hardware virtualization (haxm) required for fast emulation
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradle
      run: chmod +x ./gradlew

    - name: Enable Reactive Device Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.android/avd/*
          ~/.android/adb/*
        key: ${{ runner.os }}-avd-api33

    # Run hardware-accelerated instrumentation tests
    - name: Run Android Emulator and Verify UI
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 33
        target: google_apis
        arch: x86_64
        profile: Nexus 6
        force-avd-creation: false
        select-header-indexes: ''
        disable-animations: true
        script: ./gradlew connectedCheck --stacktrace
